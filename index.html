<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#343541"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>ChatAI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }
    body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #343541;
      color: #ececf1;
      line-height: 1.5;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
      position: relative;
    }
    header {
      padding: 12px 16px;
      background: #202123;
      border-bottom: 1px solid #4d4d4f;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-shrink: 0;
    }
    .header-title { display: flex; align-items: center; gap: 10px; font-size: 1.1rem; font-weight: 600; }
    .header-title svg { width: 24px; height: 24px; }
    .header-actions { display: flex; align-items: center; gap: 8px; }
    .icon-btn {
      background: transparent; border: none; color: #ececf1; width: 36px; height: 36px;
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.2s; padding: 6px;
    }
    .icon-btn:hover { background: #444654; }
    .icon-btn:active { background: #565869; }
    .icon-btn svg { width: 20px; height: 20px; }
    #status-badge {
      font-size: 0.7rem; padding: 4px 10px; border-radius: 12px; background: #19c37d;
      color: #0b1412; font-weight: 500; display: flex; align-items: center; gap: 4px;
    }
    #status-badge.offline { background: #565869; color: #ececf1; }
    #status-badge svg { width: 12px; height: 12px; }
    #chat-container {
      flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column;
      gap: 12px; scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
    }
    .message { display: flex; gap: 10px; max-width: 90%; animation: slideIn 0.2s ease; position: relative; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .message.bot { align-self: flex-start; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .avatar {
      width: 32px; height: 32px; border-radius: 6px; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0;
    }
    .message.bot .avatar { background: #19c37d; }
    .message.bot .avatar svg { width: 18px; height: 18px; color: #0b1412; }
    .message.user .avatar { background: #5436da; }
    .message.user .avatar svg { width: 18px; height: 18px; color: white; }
    .message-content {
      padding: 12px 14px; border-radius: 16px; word-wrap: break-word;
      white-space: pre-wrap; line-height: 1.5; font-size: 0.95rem; position: relative;
    }
    .message.bot .message-content { background: #2b2d31; border-top-left-radius: 4px; }
    .message.user .message-content { background: #444654; border-top-right-radius: 4px; }
    .message-meta {
      display: flex; align-items: center; gap: 8px; margin-top: 6px;
      font-size: 0.75rem; color: #8e8ea0;
    }
    .message-actions { display: flex; gap: 4px; margin-left: auto; }
    .message-action-btn {
      background: transparent; border: none; color: #8e8ea0; width: 24px; height: 24px;
      border-radius: 4px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; padding: 2px; transition: color 0.2s, background 0.2s;
    }
    .message-action-btn:hover { color: #ececf1; background: #444654; }
    .message-action-btn svg { width: 14px; height: 14px; }
    .message-content code { background: #1e1f29; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 0.9em; }
    .message-content pre { background: #1e1f29; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; font-family: monospace; font-size: 0.9em; }
    .message-content pre code { background: transparent; padding: 0; }
    #input-area {
      padding: 12px 16px 16px; background: #343541; border-top: 1px solid #4d4d4f;
      position: sticky; bottom: 0; z-index: 100; flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom, 16px);
    }
    #error-banner {
      background: #7b2d3a; color: #fff; padding: 8px 12px; border-radius: 8px;
      margin-bottom: 8px; font-size: 0.85rem; display: none; line-height: 1.4;
    }
    #error-banner.show { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    #input-wrapper {
      display: flex; align-items: flex-end; gap: 10px; background: #40414f;
      border-radius: 16px; padding: 8px 12px; border: 1px solid #565869; transition: border-color 0.2s, box-shadow 0.2s;
    }
    #input-wrapper:focus-within { border-color: #19c37d; box-shadow: 0 0 0 2px rgba(25, 195, 125, 0.25); }
    #user-input {
      flex: 1; background: transparent; border: none; color: #ececf1; font-size: 1rem;
      resize: none; max-height: 150px; outline: none; padding: 6px 4px; line-height: 1.4; min-height: 24px;
    }
    #user-input::placeholder { color: #8e8ea0; }
    #char-counter { font-size: 0.7rem; color: #8e8ea0; text-align: right; margin-top: 4px; user-select: none; }
    #send-btn {
      background: #19c37d; border: none; color: #0b1412; width: 40px; height: 40px;
      border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.2s, transform 0.1s;
    }
    #send-btn:hover { background: #1a9f66; }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { background: #565869; cursor: not-allowed; transform: none; opacity: 0.6; }
    #send-btn svg { width: 20px; height: 20px; }
    .typing {
      display: flex; gap: 4px; padding: 12px 14px; background: #2b2d31; border-radius: 16px;
      border-top-left-radius: 4px; width: fit-content; align-self: flex-start;
    }
    .typing span {
      width: 7px; height: 7px; background: #8e8ea0; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out;
    }
    .typing span:nth-child(1) { animation-delay: -0.32s; }
    .typing span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40% { transform: scale(1.2); opacity: 1; }
    }
    .welcome { text-align: center; padding: 32px 20px; color: #8e8ea0; }
    .welcome svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.8; }
    .welcome h2 { color: #ececf1; margin-bottom: 10px; font-size: 1.3rem; font-weight: 600; }
    .welcome p { margin-bottom: 6px; font-size: 0.95rem; }
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6);
      display: none; align-items: flex-end; justify-content: center; z-index: 200; padding: 16px;
    }
    .modal-overlay.show { display: flex; animation: fadeIn 0.2s; }
    .modal-content {
      background: #202123; border-radius: 16px 16px 0 0; padding: 20px;
      width: 100%; max-width: 500px; max-height: 70vh; overflow-y: auto;
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #4d4d4f;
    }
    .modal-header h3 { font-size: 1.1rem; font-weight: 600; }
    .menu-list { display: flex; flex-direction: column; gap: 4px; }
    .menu-item {
      display: flex; align-items: center; gap: 12px; padding: 12px 14px;
      border-radius: 10px; background: #2b2d31; cursor: pointer; transition: background 0.2s; font-size: 0.95rem;
    }
    .menu-item:hover { background: #444654; }
    .menu-item svg { width: 20px; height: 20px; flex-shrink: 0; }
    .menu-item.danger { color: #f56565; }
    .menu-item.danger:hover { background: #4a2d35; }
    #toast-container {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      z-index: 300; display: flex; flex-direction: column; gap: 8px; pointer-events: none;
    }
    .toast {
      background: #202123; color: #ececf1; padding: 10px 16px; border-radius: 10px;
      font-size: 0.9rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); display: flex;
      align-items: center; gap: 8px; animation: slideUp 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
      pointer-events: auto; max-width: 90vw;
    }
    .toast svg { width: 18px; height: 18px; flex-shrink: 0; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #565869; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #6e6e80; }
    @media (max-width: 480px) {
      .message { max-width: 95%; }
      .message-content { font-size: 0.92rem; }
      header { padding: 10px 14px; }
      #input-area { padding: 10px 14px 14px; }
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="header-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 0 0-3 3v1a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
          <line x1="12" y1="19" x2="12" y2="22"></line>
        </svg>
        <span>ChatAI</span>
      </div>
      <div class="header-actions">
        <span id="status-badge">
          <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="8"/></svg>
          Conectando
        </span>
        <button class="icon-btn" id="menu-btn" aria-label="Abrir menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </div>
    </header>

    <div id="chat-container">
      <div class="welcome">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
        <h2>Bienvenido</h2>
        <p>Asistente IA gratuito y sin registro</p>
      </div>
    </div>

    <div id="input-area">
      <div id="error-banner"></div>
      <div id="input-wrapper">
        <textarea id="user-input" placeholder="Escribe tu mensaje..." rows="1" maxlength="4000" aria-label="Campo de mensaje"></textarea>
        <button id="send-btn" aria-label="Enviar mensaje">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <div id="char-counter">0 / 4000</div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Opciones</h3>
        <button class="icon-btn" id="modal-close" aria-label="Cerrar menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="menu-list">
        <div class="menu-item" id="new-chat-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Nueva conversacion
        </div>
        <div class="menu-item" id="export-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
          Exportar conversacion
        </div>
        <div class="menu-item" id="copy-all-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
          Copiar todo el chat
        </div>
        <div class="menu-item danger" id="clear-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          </svg>
          Limpiar conversacion
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script>
    const state = {
      messages: [],
      isTyping: false,
      apiOnline: false,
      fallbackMode: true,
      context: []
    };

    const els = {
      chat: document.getElementById('chat-container'),
      input: document.getElementById('user-input'),
      sendBtn: document.getElementById('send-btn'),
      counter: document.getElementById('char-counter'),
      status: document.getElementById('status-badge'),
      errorBanner: document.getElementById('error-banner'),
      menuBtn: document.getElementById('menu-btn'),
      modal: document.getElementById('modal-overlay'),
      modalClose: document.getElementById('modal-close'),
      toastContainer: document.getElementById('toast-container')
    };

    document.addEventListener('DOMContentLoaded', () => {
      initEventListeners();
      adjustInputHeight();
      testAPI();
    });

    function initEventListeners() {
      els.sendBtn.addEventListener('click', sendMessage);
      els.input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
      });
      els.input.addEventListener('input', () => { adjustInputHeight(); updateCharCounter(); });
      
      els.menuBtn.addEventListener('click', () => showModal(true));
      els.modalClose.addEventListener('click', () => showModal(false));
      els.modal.addEventListener('click', (e) => { if (e.target === els.modal) showModal(false); });
      
      document.getElementById('new-chat-btn').addEventListener('click', newConversation);
      document.getElementById('export-btn').addEventListener('click', exportConversation);
      document.getElementById('copy-all-btn').addEventListener('click', copyAllMessages);
      document.getElementById('clear-btn').addEventListener('click', clearConversation);
      
      els.chat.addEventListener('click', (e) => {
        const btn = e.target.closest('.message-action-btn');
        if (!btn) return;
        const action = btn.dataset.action;
        const msgEl = btn.closest('.message');
        const content = msgEl.querySelector('.message-content').textContent;
        if (action === 'copy') copyToClipboard(content, 'Mensaje copiado');
        if (action === 'regenerate' && msgEl.classList.contains('bot')) regenerateResponse();
      });

      window.addEventListener('online', () => { if (!state.apiOnline) testAPI(); });
    }

    async function testAPI() {
      try {
        const controller = new AbortController();
        setTimeout(() => controller.abort(), 4000);
        const res = await fetch('https://text.pollinations.ai/', {
          method: 'POST',
          signal: controller.signal,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ model: 'openai', messages: [{ role: 'user', content: 'test' }] })
        });
        if (res.ok) {
          state.apiOnline = true;
          state.fallbackMode = false;
          updateStatus('Conectado', false);
          hideError();
        } else throw new Error('API error');
      } catch {
        state.apiOnline = false;
        state.fallbackMode = true;
        updateStatus('Modo Local', true);
      }
    }

    function updateStatus(text, offline) {
      els.status.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="8"/></svg>${text}`;
      els.status.className = offline ? 'offline' : '';
    }

    async function sendMessage() {
      const text = els.input.value.trim();
      if (!text || state.isTyping) return;

      addMessage('user', text);
      els.input.value = '';
      adjustInputHeight();
      updateCharCounter();
      updateContext('user', text);

      showTyping();
      state.isTyping = true;
      els.sendBtn.disabled = true;

      try {
        const response = state.apiOnline && !state.fallbackMode
          ? await fetchPollinations(text)
          : await generateLocalResponse(text);
        
        addMessage('bot', response);
        updateContext('bot', response);
        
        if (state.fallbackMode) {
          state.fallbackMode = false;
          hideError();
          showToast('Conexion restaurada', 'check');
        }
      } catch (err) {
        state.apiOnline = false;
        state.fallbackMode = true;
        updateStatus('Modo Local', true);
        const fallback = await generateLocalResponse(text);
        addMessage('bot', fallback);
        updateContext('bot', fallback);
        showError('Sin conexion a red. Usando respuestas locales.');
      } finally {
        hideTyping();
        state.isTyping = false;
        els.sendBtn.disabled = false;
        scrollToBottom();
      }
    }

    async function fetchPollinations(prompt) {
      const messages = [
        { role: 'system', content: 'Eres un asistente util, conciso y preciso.' },
        ...state.context.slice(-10)
      ];
      
      const res = await fetch('https://text.pollinations.ai/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: 'openai', messages })
      });
      
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.text();
    }

    async function generateLocalResponse(input) {
      await new Promise(r => setTimeout(r, 400 + Math.random() * 500));
      const lower = input.toLowerCase();
      const responses = {
        greeting: ['Hola. Como puedo ayudarte?', 'Bienvenido. Que necesitas?', 'Saludos. Estoy listo para asistirte.'],
        thanks: ['De nada. Algo mas?', 'Un placer ayudar. Necesitas algo adicional?', 'Con gusto. Aqui estare si me requieres.'],
        about: `Soy un asistente integrado localmente.\n\n• Funciona sin instalacion\n• Sin registro requerido\n• Conversacion con contexto\n• ${state.apiOnline ? 'Conectado a API externa' : 'Modo local activo'}\n\nPara informacion actualizada, consulta fuentes especializadas.`,
        code: `Ejemplo de funcion en JavaScript:\n\n\`\`\`js\nfunction procesar(datos) {\n  return datos.filter(d => d.activo).map(d => d.valor * 2);\n}\n\`\`\`\n\nConsejos:\n• Usa nombres descriptivos\n• Valida entradas del usuario\n• Maneja errores con try/catch\n\nRequieres ayuda con codigo especifico?`,
        farewell: ['Hasta luego. Vuelve cuando necesites.', 'Adios. Que tengas un buen dia.', 'Nos vemos. Estoy disponible.'],
        help: `Funciones disponibles:\n\n✓ Responder preguntas generales\n✓ Asistencia con programacion\n✓ Explicaciones de conceptos\n✓ Mantener contexto\n✓ Exportar chat a texto\n\nLimitaciones:\n• Sin acceso a internet en modo local\n• Conocimiento predefinido\n• Sin ejecucion de codigo\n\nEn que puedo asistirte?`,
        default: [
          'Interesante. Con mis capacidades actuales, puedo ofrecerte una perspectiva general. Podrias proporcionar mas contexto para una respuesta mas precisa?',
          'Entiendo tu consulta. En modo local, mis respuestas se basan en patrones predefinidos. Para informacion critica, verifica con fuentes especializadas.',
          'Buena pregunta. Hare mi mejor esfuerzo con los recursos disponibles. Hay algun aspecto especifico en el que pueda enfocarme?'
        ]
      };
      
      const pick = arr => arr[Math.floor(Math.random() * arr.length)];
      if (/^(hola|hey|buenos|hi|hello)/i.test(lower)) return pick(responses.greeting);
      if (/(gracias|thank|grax)/i.test(lower)) return pick(responses.thanks);
      if (/(quien eres|que eres|who are you|como funcion|sobre ti)/i.test(lower)) return responses.about;
      if (/(codigo|program|javascript|python|html|funcion|function)/i.test(lower)) return responses.code;
      if (/(adios|chao|bye|hasta luego|nos vemos)/i.test(lower)) return pick(responses.farewell);
      if (/(que es|explica|definicion|significa|help|ayuda|puedes)/i.test(lower)) return responses.help;
      return responses.default[state.messages.length % responses.default.length];
    }

    function updateContext(role, content) {
      state.context.push({ role, content });
      if (state.context.length > 15) state.context = state.context.slice(-15);
    }

    function addMessage(role, content) {
      const msg = document.createElement('div');
      msg.className = `message ${role}`;
      
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.innerHTML = role === 'bot' 
        ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v1a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';
      
      const contentEl = document.createElement('div');
      contentEl.className = 'message-content';
      contentEl.textContent = content;
      
      const meta = document.createElement('div');
      meta.className = 'message-meta';
      const time = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
      meta.innerHTML = `
        <span>${time}</span>
        <div class="message-actions">
          <button class="message-action-btn" data-action="copy" aria-label="Copiar mensaje">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
          ${role === 'bot' ? `<button class="message-action-btn" data-action="regenerate" aria-label="Regenerar respuesta">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>` : ''}
        </div>
      `;
      
      const wrapper = document.createElement('div');
      wrapper.appendChild(contentEl);
      wrapper.appendChild(meta);
      msg.appendChild(avatar);
      msg.appendChild(wrapper);
      
      const welcome = els.chat.querySelector('.welcome');
      if (welcome) welcome.remove();
      
      els.chat.appendChild(msg);
      scrollToBottom();
    }

    function showTyping() {
      if (document.querySelector('.typing')) return;
      const typing = document.createElement('div');
      typing.className = 'message bot typing';
      typing.id = 'typing-indicator';
      typing.innerHTML = '<span></span><span></span><span></span>';
      typing.setAttribute('aria-label', 'Escribiendo...');
      els.chat.appendChild(typing);
      scrollToBottom();
    }

    function hideTyping() { document.getElementById('typing-indicator')?.remove(); }
    function scrollToBottom() { els.chat.scrollTop = els.chat.scrollHeight; }
    function adjustInputHeight() { els.input.style.height = 'auto'; els.input.style.height = Math.min(els.input.scrollHeight, 150) + 'px'; }
    function updateCharCounter() {
      const len = els.input.value.length;
      els.counter.textContent = `${len} / 4000`;
      els.counter.style.color = len > 3800 ? '#f56565' : '#8e8ea0';
    }

    function showModal(show) { els.modal.classList.toggle('show', show); document.body.style.overflow = show ? 'hidden' : ''; }
    function showError(msg) { els.errorBanner.textContent = msg; els.errorBanner.classList.add('show'); setTimeout(() => els.errorBanner.classList.remove('show'), 5000); }
    function hideError() { els.errorBanner.classList.remove('show'); }

    function showToast(message, icon = 'info') {
      const toast = document.createElement('div');
      toast.className = 'toast';
      const icons = {
        check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>',
        copy: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',
        info: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',
        error: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
      };
      toast.innerHTML = `${icons[icon] || icons.info}<span>${message}</span>`;
      els.toastContainer.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    async function copyToClipboard(text, successMsg) {
      try { await navigator.clipboard.writeText(text); showToast(successMsg, 'copy'); } 
      catch { showToast('No se pudo copiar', 'error'); }
    }

    function newConversation() {
      if (state.isTyping) return;
      if (state.messages.length > 0 && !confirm('Iniciar nueva conversacion?')) return;
      state.messages = [];
      state.context = [];
      els.chat.innerHTML = `<div class="welcome"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><h2>Nueva conversacion</h2><p>En que puedo ayudarte hoy?</p></div>`;
      showModal(false);
      showToast('Nueva conversacion iniciada', 'check');
      els.input.focus();
    }

    function clearConversation() {
      if (state.isTyping || !confirm('Eliminar toda la conversacion?')) return;
      state.messages = [];
      state.context = [];
      els.chat.innerHTML = `<div class="welcome"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><h2>Conversacion limpiada</h2><p>Que deseas preguntar ahora?</p></div>`;
      showModal(false);
      showToast('Conversacion eliminada', 'check');
    }

    function exportConversation() {
      if (state.messages.length === 0) { showToast('No hay mensajes para exportar', 'info'); return; }
      const content = state.messages.map(m => `[${new Date().toLocaleString()}] ${m.role === 'user' ? 'Tú' : 'IA'}:\n${m.content}\n`).join('\n---\n\n');
      const blob = new Blob([content], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `chat_${new Date().toISOString().slice(0,10)}.txt`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showModal(false);
      showToast('Conversacion exportada', 'check');
    }

    async function copyAllMessages() {
      if (state.messages.length === 0) { showToast('No hay mensajes para copiar', 'info'); return; }
      const text = state.messages.map(m => `${m.role === 'user' ? 'Tú' : 'IA'}: ${m.content}`).join('\n\n');
      await copyToClipboard(text, 'Chat copiado');
      showModal(false);
    }

    async function regenerateResponse() {
      const userMsg = [...state.messages].reverse().find(m => m.role === 'user');
      if (!userMsg) return;
      state.messages = state.messages.filter((m, i, arr) => !(i === arr.length - 1 && m.role === 'bot'));
      state.context = state.context.filter((m, i, arr) => !(i === arr.length - 1 && m.role === 'bot'));
      const lastMsg = els.chat.lastElementChild;
      if (lastMsg?.classList.contains('bot')) lastMsg.remove();
      
      state.isTyping = true;
      els.sendBtn.disabled = true;
      showTyping();
      
      try {
        const response = state.apiOnline && !state.fallbackMode ? await fetchPollinations(userMsg.content) : await generateLocalResponse(userMsg.content);
        addMessage('bot', response);
        updateContext('bot', response);
        showToast('Respuesta regenerada', 'check');
      } catch {
        const fallback = await generateLocalResponse(userMsg.content);
        addMessage('bot', fallback);
        updateContext('bot', fallback);
      } finally {
        hideTyping();
        state.isTyping = false;
        els.sendBtn.disabled = false;
        scrollToBottom();
      }
    }
  </script>
</body>
</html>
