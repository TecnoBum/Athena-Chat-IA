<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatGPT Clone - IA Gratuita</title>
  <style>
    /* ===== RESET Y BASE ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background-color: #343541;
      color: #ececf1;
      line-height: 1.5;
    }

    /* ===== LAYOUT PRINCIPAL ===== */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    /* ===== HEADER ===== */
    header {
      padding: 12px 20px;
      background: #202123;
      border-bottom: 1px solid #4d4d4f;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 {
      font-size: 1.2rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    header h1::before { content: "🤖"; font-size: 1.3rem; }
    #status-badge {
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 20px;
      background: #19c37d;
      color: #0b1412;
      font-weight: 500;
    }
    #status-badge.offline {
      background: #565869;
      color: #ececf1;
    }
    #clear-btn {
      background: #444654;
      border: none;
      color: #ececf1;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    #clear-btn:hover { background: #565869; }

    /* ===== ÁREA DE MENSAJES ===== */
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    /* ===== MENSAJES ===== */
    .message {
      display: flex;
      gap: 12px;
      max-width: 85%;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.bot { align-self: flex-start; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .message.bot .avatar { background: #19c37d; color: #0b1412; }
    .message.user .avatar { background: #5436da; color: white; }

    .message-content {
      padding: 12px 16px;
      border-radius: 12px;
      word-wrap: break-word;
      white-space: pre-wrap;
      line-height: 1.6;
    }
    .message.bot .message-content {
      background: #2b2d31;
      border-top-left-radius: 4px;
    }
    .message.user .message-content {
      background: #444654;
      border-top-right-radius: 4px;
    }

    .message-content code {
      background: #1e1f29;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.95em;
    }
    .message-content pre {
      background: #1e1f29;
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 8px 0;
    }

    /* ===== INPUT AREA ===== */
    #input-area {
      padding: 16px 20px 24px;
      background: #343541;
      border-top: 1px solid #4d4d4f;
      position: sticky;
      bottom: 0;
    }
    #input-wrapper {
      display: flex;
      gap: 10px;
      background: #40414f;
      border-radius: 12px;
      padding: 8px 12px;
      border: 1px solid #565869;
      transition: border-color 0.2s;
    }
    #input-wrapper:focus-within {
      border-color: #19c37d;
      box-shadow: 0 0 0 2px rgba(25, 195, 125, 0.2);
    }
    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      color: #ececf1;
      font-size: 1rem;
      resize: none;
      max-height: 200px;
      outline: none;
      padding: 8px 4px;
      line-height: 1.5;
    }
    #user-input::placeholder { color: #8e8ea0; }
    #send-btn {
      background: #19c37d;
      border: none;
      color: #0b1412;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    #send-btn:hover { background: #1a9f66; }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled {
      background: #565869;
      cursor: not-allowed;
      transform: none;
    }

    /* ===== TYPING INDICATOR ===== */
    .typing {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: #2b2d31;
      border-radius: 12px;
      border-top-left-radius: 4px;
      width: fit-content;
      align-self: flex-start;
    }
    .typing span {
      width: 8px;
      height: 8px;
      background: #8e8ea0;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }
    .typing span:nth-child(1) { animation-delay: -0.32s; }
    .typing span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40% { transform: scale(1.2); opacity: 1; }
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #2b2d31; }
    ::-webkit-scrollbar-thumb {
      background: #565869;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover { background: #6e6e80; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .message { max-width: 95%; }
      header { padding: 10px 16px; }
      #input-area { padding: 12px 16px 20px; }
    }

    /* ===== WELCOME MESSAGE ===== */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: #8e8ea0;
    }
    .welcome h2 {
      color: #ececf1;
      margin-bottom: 12px;
      font-size: 1.5rem;
    }
    .welcome p { margin-bottom: 8px; }
    .welcome .tip {
      background: #2b2d31;
      padding: 12px;
      border-radius: 8px;
      margin-top: 16px;
      font-size: 0.9rem;
      text-align: left;
    }
    
    /* ===== ERROR MESSAGE ===== */
    .error-banner {
      background: #7b2d3a;
      color: #fff;
      padding: 10px 16px;
      border-radius: 8px;
      margin: 8px 0;
      font-size: 0.9rem;
      display: none;
    }
    .error-banner.show { display: block; animation: fadeIn 0.3s; }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>ChatGPT Clone</h1>
      <div style="display:flex;gap:8px;align-items:center">
        <span id="status-badge" title="Estado de conexión">🟢 Online</span>
        <button id="clear-btn" title="Limpiar conversación">🗑️</button>
      </div>
    </header>

    <div id="chat-container">
      <div class="welcome">
        <h2>👋 ¡Bienvenido!</h2>
        <p>IA gratuita conectada a <strong>Pollinations.AI</strong> (vía g4f.dev).</p>
        <p>✅ Sin API keys • ✅ Sin registro • ✅ Funciona al abrir el archivo</p>
        <div class="tip">
          💡 <strong>Consejo:</strong> Presiona <code>Enter</code> para enviar, <code>Shift+Enter</code> para nueva línea.
        </div>
      </div>
    </div>

    <div id="input-area">
      <div id="error-banner" class="error-banner"></div>
      <div id="input-wrapper">
        <textarea 
          id="user-input" 
          placeholder="Escribe tu mensaje..." 
          rows="1"
          maxlength="4000"
        ></textarea>
        <button id="send-btn" title="Enviar (Enter)">➤</button>
      </div>
    </div>
  </div>

  <!-- Cliente oficial de g4f.dev para navegador -->
  <script type="module">
    // Importamos el cliente oficial de g4f.dev desde CDN [[11]]
    import { Client, PollinationsAI } from 'https://g4f.dev/dist/js/client.js';

    // ===== ESTADO GLOBAL =====
    const state = {
      messages: [],
      isTyping: false,
      apiOnline: true,
      fallbackMode: false
    };

    // ===== ELEMENTOS DOM =====
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const clearBtn = document.getElementById('clear-btn');
    const statusBadge = document.getElementById('status-badge');
    const errorBanner = document.getElementById('error-banner');

    // ===== INICIALIZACIÓN =====
    document.addEventListener('DOMContentLoaded', () => {
      adjustTextareaHeight();
      setupEventListeners();
      testAPIConnection();
    });

    // ===== EVENT LISTENERS =====
    function setupEventListeners() {
      sendBtn.addEventListener('click', handleSend);
      userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      });
      userInput.addEventListener('input', adjustTextareaHeight);
      clearBtn.addEventListener('click', clearConversation);
    }

    // ===== TEST DE CONEXIÓN API =====
    async function testAPIConnection() {
      try {
        // Intentamos una llamada mínima a PollinationsAI (sin API key) [[11]]
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 5000);
        
        const response = await fetch('https://text.pollinations.ai/hello?model=openai&seed=42', {
          signal: controller.signal,
          headers: { 'Accept': 'text/plain' }
        });
        
        clearTimeout(timeout);
        
        if (response.ok) {
          state.apiOnline = true;
          statusBadge.textContent = '🟢 Online';
          statusBadge.className = '';
        } else {
          throw new Error('API no disponible');
        }
      } catch (err) {
        console.warn('⚠️ API externa no disponible, usando modo local:', err);
        state.apiOnline = false;
        state.fallbackMode = true;
        statusBadge.textContent = '🟡 Modo Local';
        statusBadge.className = 'offline';
        showError('Usando IA local. Para respuestas más avanzadas, verifica tu conexión a internet.');
      }
    }

    // ===== MANEJO DE MENSAJES =====
    async function handleSend() {
      const text = userInput.value.trim();
      if (!text || state.isTyping) return;

      addMessage('user', text);
      userInput.value = '';
      adjustTextareaHeight();
      updateContext('user', text);

      showTypingIndicator();
      state.isTyping = true;
      sendBtn.disabled = true;

      try {
        let botResponse;
        
        if (state.apiOnline && !state.fallbackMode) {
          // 🔹 CONEXIÓN REAL A POLLINATIONS.AI (vía g4f.dev) [[11]]
          botResponse = await fetchPollinationsAPI(text);
        } else {
          // 🔹 FALLBACK: IA LOCAL INTELIGENTE
          botResponse = await generateLocalResponse(text);
        }
        
        addMessage('bot', botResponse);
        updateContext('bot', botResponse);
        
        // Si la API falló pero ahora funciona, reactivar
        if (state.fallbackMode && state.apiOnline) {
          state.fallbackMode = false;
          hideError();
        }
        
      } catch (error) {
        console.error('Error:', error);
        state.apiOnline = false;
        state.fallbackMode = true;
        statusBadge.textContent = '🟡 Modo Local';
        statusBadge.className = 'offline';
        
        // Reintentar con respuesta local
        const fallbackResponse = await generateLocalResponse(text);
        addMessage('bot', fallbackResponse + '\n\n⚠️ *Respuesta generada en modo local por error de conexión.*');
        updateContext('bot', fallbackResponse);
        showError('⚠️ Error de conexión. Usando respuestas locales. Revisa tu internet para activar la IA completa.');
        
      } finally {
        hideTypingIndicator();
        state.isTyping = false;
        sendBtn.disabled = false;
        scrollToBottom();
      }
    }

    // ===== CONEXIÓN A POLLINATIONS.AI (API GRATUITA) =====
    async function fetchPollinationsAPI(userMessage) {
      // Usamos el endpoint directo de Pollinations.AI que permite CORS [[11]]
      // Formato: https://text.pollinations.ai/{prompt}?model={model}&seed={seed}
      
      const prompt = encodeURIComponent(userMessage);
      const model = 'openai'; // Modelo gratuito y rápido
      const seed = Math.floor(Math.random() * 10000);
      
      // Construimos el contexto de conversación (últimos 6 mensajes)
      const context = state.messages
        .slice(-6)
        .map(m => `${m.role === 'user' ? 'Usuario' : 'Asistente'}: ${m.content}`)
        .join('\n');
      
      const fullPrompt = context 
        ? `Contexto reciente:\n${context}\n\nUsuario: ${userMessage}`
        : userMessage;

      const url = `https://text.pollinations.ai/${encodeURIComponent(fullPrompt)}?model=${model}&seed=${seed}&json=false`;
      
      const response = await fetch(url, {
        method: 'GET',
        headers: { 'Accept': 'text/plain' }
      });
      
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }
      
      return await response.text();
    }

    // ===== IA LOCAL - FALLBACK INTELIGENTE =====
    async function generateLocalResponse(userMessage) {
      await new Promise(resolve => setTimeout(resolve, 500 + Math.random() * 700));
      
      const lower = userMessage.toLowerCase();
      
      // Saludos
      if (/^(hola|hey|buenos|hi|hello)/i.test(lower)) {
        return getRandomResponse([
          '¡Hola! 👋 Soy tu asistente IA gratuito. ¿En qué puedo ayudarte hoy?',
          '¡Hey! 🤖 Estoy listo para ayudarte. ¿Qué necesitas?',
          '¡Hola de nuevo! 😊 ¿Qué tal? ¿En qué te ayudo?'
        ]);
      }
      
      // Agradecimientos
      if (/(gracias|thank|grax)/i.test(lower)) {
        return getRandomResponse([
          '¡De nada! 😊 Si necesitas algo más, aquí estaré.',
          '¡Me alegra poder ayudar! 🙌 ¿Algo más?',
          '¡Con gusto! 💚 No dudes en preguntar.'
        ]);
      }
      
      // Información sobre el sistema
      if (/(quién eres|qué eres|who are you|cómo funcion|cómo estás programad)/i.test(lower)) {
        return `Soy un clon de ChatGPT con IA integrada. 🤖\n\n🔹 **Modo actual:** ${state.apiOnline ? '✅ Conectado a Pollinations.AI (gratis)' : '🟡 Local (sin internet)'}\n🔹 **Sin API keys** ni configuración\n🔹 **Sin envío de datos** a servidores externos (en modo local)\n🔹 **Contexto de conversación** durante esta sesión\n\n💡 Para respuestas más avanzadas, asegúrate de tener conexión a internet.`;
      }
      
      // Ayuda con código
      if (/(código|codigo|program|javascript|python|html|css|función|function)/i.test(lower)) {
        return `👨‍💻 ¡Me encanta el código! Aquí tienes un ejemplo:\n\n\`\`\`javascript\n// Función para saludar\nfunction saludar(nombre) {\n  return \`¡Hola, \${nombre}! 👋\`;\n}\n\nconsole.log(saludar('Mundo'));\n// Resultado: ¡Hola, Mundo! 👋\n\`\`\`\n\n💡 Consejos:\n• Usa nombres descriptivos\n• Comenta tu código\n• Prueba en pequeñas partes\n\n¿Necesitas ayuda con algo específico? 🚀`;
      }
      
      // Despedidas
      if (/(adiós|chao|bye|hasta luego|nos vemos)/i.test(lower)) {
        return getRandomResponse([
          '¡Hasta luego! 👋 Fue un placer. ¡Vuelve cuando necesites!',
          '¡Nos vemos! 😊 Estoy aquí 24/7 en tu navegador.',
          '¡Adiós! 🌟 Si tienes más preguntas, solo abre este archivo de nuevo.'
        ]);
      }
      
      // Preguntas generales
      if (/(qué es|explica|definición|significa|help|ayuda)/i.test(lower)) {
        const topic = userMessage.replace(/^(qué es|explica|definición|significa|help|ayuda)[\s:]+/i, '').trim().substring(0, 40);
        return `📚 Sobre "${topic || 'tu consulta'}":\n\nComo ${state.apiOnline ? 'IA conectada' : 'asistente local'}, puedo darte una explicación general:\n\n• Es un concepto que varía según el contexto\n• Para información precisa y actualizada, consulta fuentes oficiales\n• ¿Podrías darme más detalles? Así ajusto mejor mi respuesta. 🎯`;
      }
      
      // Respuesta por defecto con variación
      const defaults = [
        `Interesante pregunta. 🤔 ${state.apiOnline ? 'He consultado mis recursos' : 'Con mis capacidades actuales'} para darte la mejor respuesta posible.\n\n¿Podrías reformular o darme más contexto? ¡Haré mi mejor esfuerzo! 💪`,
        `¡Buena pregunta! 🔍 ${state.apiOnline ? 'Procesando con IA externa' : 'En modo local'}, mis respuestas se basan en patrones predefinidos.\n\n💡 Consejo: Intenta ser más específico o divide tu pregunta en partes.`
      ];
      return defaults[state.messages.length % defaults.length];
    }

    // ===== UTILIDADES =====
    function getRandomResponse(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function updateContext(role, content) {
      state.messages.push({ role, content });
      if (state.messages.length > 20) {
        state.messages = state.messages.slice(-20);
      }
    }

    // ===== UI FUNCTIONS =====
    function addMessage(role, content) {
      state.messages.push({ role, content });
      
      const messageEl = document.createElement('div');
      messageEl.className = `message ${role}`;
      
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = role === 'bot' ? '🤖' : '👤';
      
      const contentEl = document.createElement('div');
      contentEl.className = 'message-content';
      contentEl.textContent = content;
      
      messageEl.appendChild(avatar);
      messageEl.appendChild(contentEl);
      
      const welcome = chatContainer.querySelector('.welcome');
      if (welcome) welcome.remove();
      
      chatContainer.appendChild(messageEl);
      scrollToBottom();
    }

    function showTypingIndicator() {
      if (document.querySelector('.typing')) return;
      const typingEl = document.createElement('div');
      typingEl.className = 'message bot typing';
      typingEl.id = 'typing-indicator';
      typingEl.innerHTML = '<span></span><span></span><span></span>';
      chatContainer.appendChild(typingEl);
      scrollToBottom();
    }

    function hideTypingIndicator() {
      document.getElementById('typing-indicator')?.remove();
    }

    function scrollToBottom() {
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function adjustTextareaHeight() {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 200) + 'px';
    }

    function showError(msg) {
      errorBanner.textContent = msg;
      errorBanner.classList.add('show');
    }

    function hideError() {
      errorBanner.classList.remove('show');
    }

    function clearConversation() {
      if (state.isTyping) return;
      if (confirm('¿Limpiar toda la conversación?')) {
        state.messages = [];
        chatContainer.innerHTML = `
          <div class="welcome">
            <h2>👋 ¡Bienvenido!</h2>
            <p>IA gratuita conectada a <strong>Pollinations.AI</strong> (vía g4f.dev).</p>
            <p>✅ Sin API keys • ✅ Sin registro • ✅ Funciona al abrir el archivo</p>
            <div class="tip">
              💡 <strong>Consejo:</strong> Presiona <code>Enter</code> para enviar, <code>Shift+Enter</code> para nueva línea.
            </div>
          </div>
        `;
        hideError();
        if (state.apiOnline) {
          statusBadge.textContent = '🟢 Online';
          statusBadge.className = '';
        }
      }
    }

    // ===== MEJORAS DE UX =====
    userInput.focus();
    
    // Detectar recuperación de conexión
    window.addEventListener('online', () => {
      if (!state.apiOnline) {
        testAPIConnection();
      }
    });
  </script>
</body>
</html>
