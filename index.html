<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="theme-color" content="#343541"/>
  <title>Athena Chat IA</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#343541;color:#ececf1;line-height:1.5;overflow:hidden;transition:background .3s,color .3s}
    body.light{background:#fff;color:#1a1a2e}
    body.light header{background:#f8f9fa;border-bottom-color:#e0e0e0}
    body.light .htitle{color:#1a1a2e}
    body.light .ibtn{color:#1a1a2e}
    body.light .ibtn:hover{background:#e0e0e0}
    body.light #sbadge.ok{background:#22c55e;color:#fff}
    body.light #sbadge.off{background:#94a3b8;color:#1a1a2e}
    body.light #chat{background:#fff}
    body.light .msg.bot .mc{background:#f1f5f9}
    body.light .msg.user .mc{background:#e0e7ff}
    body.light #ia{background:#fff;border-top-color:#e0e0e0}
    body.light #iwrap{background:#f8f9fa;border-color:#cbd5e1}
    body.light #inp{color:#1a1a2e}
    body.light #inp::placeholder{color:#64748b}
    body.light #cc{color:#64748b}
    body.light .mcont{background:#f8f9fa}
    body.light .mitem{background:#fff}
    body.light .mitem:hover{background:#e2e8f0}
    body.light .tst{background:#fff;color:#1a1a2e;box-shadow:0 4px 16px rgba(0,0,0,.1)}
    body.light .modal-bg{background:rgba(255,255,255,.6)}
    body.light .profile-card{background:#fff;border:1px solid #e0e0e0}
    body.light .profile-card h3{color:#1a1a2e}
    body.light .profile-card p{color:#64748b}
    body.light .avatar-grid .av-option{background:#f1f5f9;border-color:#cbd5e1}
    body.light .avatar-grid .av-option:hover{background:#e2e8f0}
    body.light .avatar-grid .av-option.selected{border-color:#19c37d;background:#e2e8f0}
    body.light .pform input,body.light .pform textarea{background:#f1f5f9;color:#1a1a2e;border-color:#cbd5e1}
    body.light .pform input:focus,body.light .pform textarea:focus{border-color:#22c55e}
    body.light .pform input::placeholder,body.light .pform textarea::placeholder{color:#94a3b8}
    body.light .save-btn{background:#22c55e;color:#fff}
    body.light .del-btn{background:#fee2e2;color:#dc2626}
    body.light .save-btn:hover{background:#16a34a}
    body.light .del-btn:hover{background:#fca5a5}
    body.light .sug-chip{background:#e2e8f0;color:#1a1a2e;border-color:#cbd5e1}
    body.light .sug-chip:hover{background:#cbd5e1}
    body.light .pro-badge{background:linear-gradient(135deg,#f59e0b,#d97706)}
    body.light .pro-glow{border-color:#f59e0b!important;box-shadow:0 0 12px rgba(245,158,11,.3)!important}
    body.light .error-anim{border-left:3px solid #ef4444}
    body.light .retry-btn{background:#ef4444}
    body.light .retry-btn:hover{background:#dc2626}
    body.light .limit-box{background:#fff;border:1px solid #e0e0e0}
    body.light .limit-box h3{color:#1a1a2e}
    body.light .limit-box p{color:#64748b}
    body.light .pro-section{background:#fffef5;border-color:#f59e0b}
    body.light .pro-section h3{color:#b45309}
    body.light .pro-section p{color:#92400e}
    body.light .code-input{background:#f1f5f9;border-color:#cbd5e1;color:#1a1a2e}
    body.light .code-input:focus{border-color:#f59e0b}
    #app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:900px;margin:0 auto;width:100%}
    header{padding:10px 16px;background:#202123;border-bottom:1px solid #4d4d4f;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10}
    .htitle{display:flex;align-items:center;gap:10px;font-weight:600;font-size:1.1rem;cursor:pointer;padding:4px 8px;border-radius:8px;transition:background .2s}
    .htitle:hover{background:#444654}
    .htitle svg{width:24px;height:24px}
    .hactions{display:flex;align-items:center;gap:4px}
    .ibtn{background:transparent;border:none;color:#ececf1;width:34px;height:34px;border-radius:8px;display:grid;place-items:center;cursor:pointer;padding:5px;transition:background .2s}
    .ibtn:hover{background:#444654}.ibtn:active{background:#565869}.ibtn svg{width:18px;height:18px}
    #sbadge{font-size:.6rem;padding:2px 8px;border-radius:8px;font-weight:500;display:flex;align-items:center;gap:3px}
    #sbadge.ok{background:#19c37d;color:#0b1412}#sbadge.searching{background:#d69e2e;color:#0b1412;animation:pulse 1s infinite}
    #sbadge.off{background:#565869;color:#ececf1}
    #sbadge.pro{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;animation:proGlow 2s infinite}
    @keyframes proGlow{0%,100%{box-shadow:0 0 4px rgba(245,158,11,.3)}50%{box-shadow:0 0 12px rgba(245,158,11,.6)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    #sbadge svg{width:9px;height:9px}
    #chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
    .msg{display:flex;gap:10px;max-width:90%;animation:up .2s}
    @keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .msg.bot{align-self:flex-start}.msg.user{align-self:flex-end;flex-direction:row-reverse}
    .av{width:32px;height:32px;border-radius:6px;display:grid;place-items:center;flex-shrink:0;font-size:1rem}
    .msg.bot .av{background:#19c37d}.msg.bot .av svg{width:16px;height:16px;color:#0b1412}
    .msg.user .av{background:#5436da}
    .av-emoji{width:32px;height:32px;border-radius:6px;display:grid;place-items:center;font-size:1.1rem;flex-shrink:0}
    .msg.user .av-emoji{background:linear-gradient(135deg,#667eea,#764ba2)}
    .mc{padding:12px 14px;border-radius:16px;word-break:break-word;line-height:1.6;font-size:.95rem;position:relative}
    .msg.bot .mc{background:#2b2d31;border-top-left-radius:4px}
    .msg.user .mc{background:#444654;border-top-right-radius:4px}
    .mc b,.mc strong{font-weight:600;color:#fff}.mc i,.mc em{font-style:italic;color:#c5c5d2}
    .mc code{background:#1e1f29;padding:2px 6px;border-radius:4px;font-family:monospace;font-size:.9em;color:#e0e0ff}
    .mc pre{background:#1e1f29;padding:12px;border-radius:8px;overflow-x:auto;margin:8px 0;font-family:monospace;font-size:.9em;position:relative}
    .mc pre code{background:none;padding:0;color:#a0d4ff}
    .copy-code{position:absolute;top:8px;right:8px;background:#444654;border:none;color:#ececf1;padding:4px 8px;border-radius:4px;font-size:.75rem;cursor:pointer;display:flex;align-items:center;gap:4px;opacity:0;transition:opacity .2s}
    .mc pre:hover .copy-code{opacity:1}.copy-code:hover{background:#565869}
    .copy-code svg{width:12px;height:12px}
    .mc ul,.mc ol{padding-left:20px;margin:8px 0}.mc li{margin:4px 0}
    .mc a{color:#6db3f2;text-decoration:none}.mc a:hover{text-decoration:underline}
    .mc hr{border:none;border-top:1px solid #4d4d4f;margin:12px 0}
    .mc blockquote{border-left:3px solid #19c37d;padding-left:12px;margin:8px 0;color:#a0a0b0}
    .meta{display:flex;align-items:center;gap:8px;margin-top:6px;font-size:.7rem;color:#8e8ea0}
    .resp-time{color:#64748b;margin-left:auto}
    .ma{display:flex;gap:2px;margin-left:4px}
    .mab{background:transparent;border:none;color:#8e8ea0;width:22px;height:22px;border-radius:4px;display:grid;place-items:center;cursor:pointer;padding:2px;transition:color .2s,background .2s}
    .mab:hover{color:#ececf1;background:#444654}.mab svg{width:13px;height:13px}
    #ia{padding:10px 16px 14px;background:#343541;border-top:1px solid #4d4d4f;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,14px);transition:background .3s,border-color .3s}
    #ebanner{background:#7b2d3a;color:#fff;padding:6px 10px;border-radius:6px;margin-bottom:6px;font-size:.82rem;display:none}
    #ebanner.s{display:block;animation:up .3s}
    #iwrap{display:flex;align-items:flex-end;gap:6px;background:#40414f;border-radius:14px;padding:6px 10px;border:1px solid #565869;transition:border-color .2s,box-shadow .2s}
    #iwrap:focus-within{border-color:#19c37d;box-shadow:0 0 0 2px rgba(25,195,125,.2)}
    #iwrap.limited{border-color:#ef4444;box-shadow:0 0 0 2px rgba(239,68,68,.2)}
    #inp{flex:1;background:transparent;border:none;color:#ececf1;font-size:1rem;resize:none;max-height:120px;outline:none;padding:6px 2px;line-height:1.4;min-height:24px}
    #inp::placeholder{color:#8e8ea0}#inp:disabled{opacity:.5;cursor:not-allowed}
    #cc{font-size:.6rem;color:#8e8ea0;text-align:right;margin-top:2px}
    #cc.limited{color:#ef4444;font-weight:600}
    #sbtn{background:#19c37d;border:none;color:#0b1412;width:36px;height:36px;border-radius:8px;cursor:pointer;display:grid;place-items:center;flex-shrink:0;transition:background .2s,transform .1s}
    #sbtn:hover{background:#1a9f66}#sbtn:active{transform:scale(.95)}
    #sbtn:disabled{background:#565869;cursor:not-allowed;transform:none;opacity:.5}#sbtn svg{width:18px;height:18px}
    #sbtn.pro{background:linear-gradient(135deg,#f59e0b,#d97706)}
    #sbtn.pro:hover{background:linear-gradient(135deg,#d97706,#b45309)}
    .type{display:flex;gap:4px;padding:12px 14px;background:#2b2d31;border-radius:16px;border-top-left-radius:4px;width:fit-content;align-self:flex-start}
    .type span{width:6px;height:6px;background:#8e8ea0;border-radius:50%;animation:tb 1.4s infinite ease-in-out}
    .type span:nth-child(1){animation-delay:-.32s}.type span:nth-child(2){animation-delay:-.16s}
    @keyframes tb{0%,80%,100%{transform:scale(.7);opacity:.5}40%{transform:scale(1.2);opacity:1}}
    .wel{text-align:center;padding:30px 20px;color:#8e8ea0}
    .wel svg{width:44px;height:44px;margin-bottom:14px;opacity:.7}
    .wel h2{color:#ececf1;margin-bottom:8px;font-size:1.2rem}
    .wel p{margin-bottom:5px;font-size:.9rem}
    .suggestions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;justify-content:center}
    .sug-chip{background:#2b2d31;padding:6px 12px;border-radius:20px;font-size:.8rem;cursor:pointer;transition:background .2s;border:1px solid #4d4d4f}
    .sug-chip:hover{background:#444654;border-color:#64748b}
    .voice-btn{background:#444654;border:none;color:#ececf1;width:36px;height:36px;border-radius:8px;cursor:pointer;display:grid;place-items:center;transition:background .2s}
    .voice-btn:hover{background:#565869}.voice-btn.listening{background:#ef4444;animation:pulse 1s infinite}
    .voice-btn svg{width:18px;height:18px}
    .tts-btn{background:transparent;border:none;color:#8e8ea0;width:24px;height:24px;border-radius:4px;cursor:pointer;display:grid;place-items:center;margin-left:4px}
    .tts-btn:hover{color:#ececf1;background:#444654}.tts-btn svg{width:14px;height:14px}
    .mover{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;place-items:end center;z-index:20;padding:14px}
    .mover.s{display:grid;animation:up .2s}
    .mcont{background:#202123;border-radius:14px 14px 0 0;padding:16px;width:100%;max-width:480px;max-height:70vh;overflow-y:auto}
    .mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #4d4d4f}
    .mhead h3{font-size:1rem;font-weight:600}
    .mlist{display:flex;flex-direction:column;gap:3px}
    .mitem{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:#2b2d31;cursor:pointer;font-size:.92rem;transition:background .15s}
    .mitem:hover{background:#444654}.mitem svg{width:18px;height:18px;flex-shrink:0}
    .mitem.danger{color:#f56565}.mitem.danger:hover{background:#4a2d35}
    .mitem.pro-item{background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(217,119,6,.1));border:1px solid rgba(245,158,11,.3)}
    .mitem.pro-item:hover{background:linear-gradient(135deg,rgba(245,158,11,.25),rgba(217,119,6,.2))}
    .pro-badge{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;font-size:.65rem;padding:2px 6px;border-radius:4px;font-weight:700}
    .font-control{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#2b2d31;border-radius:8px;margin-top:8px}
    .font-control span{font-size:.9rem}.font-btn{background:#444654;border:none;color:#ececf1;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:1rem}
    .font-btn:hover{background:#565869}
    #toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:30;display:flex;flex-direction:column;gap:6px;pointer-events:none}
    .tst{background:#202123;color:#ececf1;padding:8px 14px;border-radius:8px;font-size:.85rem;box-shadow:0 4px 16px rgba(0,0,0,.3);display:flex;align-items:center;gap:6px;animation:up .3s,fo .3s 2.5s forwards;pointer-events:auto;max-width:85vw}
    .tst svg{width:16px;height:16px;flex-shrink:0}@keyframes fo{to{opacity:0;transform:translateY(-8px)}}

    /* ===== PERFIL ===== */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;place-items:center;justify-content:center;z-index:50;padding:16px}
    .modal-bg.s{display:grid;animation:up .2s}
    .profile-modal{background:#202123;border-radius:16px;width:100%;max-width:440px;max-height:80vh;overflow-y:auto;padding:20px}
    .profile-header{text-align:center;margin-bottom:16px}
    .profile-avatar-big{width:64px;height:64px;border-radius:12px;display:grid;place-items:center;font-size:2rem;margin:0 auto 12px;background:linear-gradient(135deg,#667eea,#764ba2)}
    .profile-avatar-big.pro{background:linear-gradient(135deg,#f59e0b,#d97706);box-shadow:0 0 20px rgba(245,158,11,.3)}
    .profile-card{text-align:center;padding:12px;background:#2b2d31;border-radius:10px;margin-bottom:16px}
    .profile-card h3{font-size:1.1rem;color:#ececf1;margin-bottom:2px}
    .profile-card p{font-size:.85rem;color:#8e8ea0}
    .profile-section{margin-bottom:16px}
    .profile-section label{display:block;font-size:.85rem;color:#8e8ea0;margin-bottom:6px;font-weight:500}
    .pform{display:flex;flex-direction:column;gap:10px}
    .pform input,.pform textarea{background:#40414f;border:1px solid #565869;border-radius:8px;padding:10px 12px;color:#ececf1;font-size:.95rem;outline:none;transition:border-color .2s;font-family:inherit;width:100%}
    .pform input:focus,.pform textarea:focus{border-color:#19c37d}
    .pform input::placeholder,.pform textarea::placeholder{color:#8e8ea0}
    .pform textarea{resize:none;min-height:60px}
    .avatar-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:6px}
    .av-option{width:100%;aspect-ratio:1;border-radius:8px;display:grid;place-items:center;font-size:1.5rem;cursor:pointer;border:2px solid transparent;background:#40414f;transition:border-color .2s,background .2s}
    .av-option:hover{background:#444654}
    .av-option.selected{border-color:#19c37d;background:#2b2d31}
    .profile-actions{display:flex;gap:10px;margin-top:16px}
    .save-btn{flex:1;background:#19c37d;color:#0b1412;border:none;padding:10px;border-radius:8px;font-weight:600;font-size:.95rem;cursor:pointer;transition:background .2s}
    .save-btn:hover{background:#1a9f66}
    .del-btn{background:#565869;color:#f56565;border:1px solid #f5656533;padding:10px 14px;border-radius:8px;font-size:.85rem;cursor:pointer;transition:background .2s,border-color .2s}
    .del-btn:hover{background:#f5656533;border-color:#f56565}
    .cancel-btn{background:#444654;color:#ececf1;border:none;padding:10px 14px;border-radius:8px;font-size:.95rem;cursor:pointer;transition:background .2s}
    .cancel-btn:hover{background:#565869}
    .profile-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
    .stat-box{text-align:center;background:#40414f;padding:10px 8px;border-radius:8px}
    .stat-box .stat-num{font-size:1.2rem;font-weight:700;color:#19c37d}
    .stat-box .stat-label{font-size:.7rem;color:#8e8ea0;margin-top:2px}
    .stat-box .stat-num.pro{color:#f59e0b}
    .no-profile{text-align:center;padding:20px 16px}
    .no-profile svg{width:48px;height:48px;margin-bottom:12px;opacity:.5}
    .no-profile h3{margin-bottom:6px}
    .no-profile p{color:#8e8ea0;font-size:.9rem;margin-bottom:16px}
    .create-btn{background:#19c37d;color:#0b1412;border:none;padding:10px 24px;border-radius:8px;font-weight:600;font-size:.95rem;cursor:pointer;transition:background .2s}
    .create-btn:hover{background:#1a9f66}

    /* ===== LIMIT BOX ===== */
    .limit-box{background:#2b2d31;border-radius:12px;padding:16px;margin:16px 0;text-align:center;border:1px solid #4d4d4f}
    .limit-box h3{color:#ef4444;margin-bottom:8px;font-size:1.1rem}
    .limit-box p{color:#8e8ea0;font-size:.9rem;margin-bottom:4px}
    .limit-box .remaining{font-size:2rem;font-weight:700;color:#f59e0b;margin:8px 0}
    .limit-box .remaining.unlimited{color:#19c37d}
    .limit-bar{width:100%;height:6px;background:#40414f;border-radius:3px;margin:8px 0;overflow:hidden}
    .limit-bar-fill{height:100%;background:linear-gradient(90deg,#19c37d,#f59e0b,#ef4444);border-radius:3px;transition:width .3s}
    .limit-bar-fill.pro{background:linear-gradient(90deg,#f59e0b,#d97706)}

    /* ===== ERROR ANIMATION ===== */
    .error-anim{border-left:3px solid #ef4444;animation:errorPulse 2s infinite}
    @keyframes errorPulse{0%,100%{border-left-color:#ef4444}50%{border-left-color:#f59e0b}}
    .retry-btn{background:#ef4444;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-weight:600;cursor:pointer;margin-top:10px;transition:background .2s;display:flex;align-items:center;gap:8px;justify-content:center;width:100%}
    .retry-btn:hover{background:#dc2626}
    .retry-btn svg{width:18px;height:18px;animation:spin 1s linear infinite}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    .error-waves{display:flex;justify-content:center;gap:3px;margin:12px 0}
    .error-waves span{width:4px;height:20px;background:#ef4444;border-radius:2px;animation:wave 1s ease-in-out infinite}
    .error-waves span:nth-child(1){animation-delay:0s}
    .error-waves span:nth-child(2){animation-delay:.1s}
    .error-waves span:nth-child(3){animation-delay:.2s}
    .error-waves span:nth-child(4){animation-delay:.3s}
    .error-waves span:nth-child(5){animation-delay:.4s}
    @keyframes wave{0%,100%{height:8px;opacity:.3}50%{height:24px;opacity:1}}

    /* ===== PRO SECTION ===== */
    .pro-section{background:linear-gradient(135deg,rgba(245,158,11,.1),rgba(217,119,6,.05));border:1px solid rgba(245,158,11,.3);border-radius:12px;padding:16px;margin:12px 0}
    .pro-section h3{color:#f59e0b;margin-bottom:8px;display:flex;align-items:center;gap:8px;font-size:1.1rem}
    .pro-section p{color:#c5c5d2;font-size:.9rem;margin-bottom:4px;line-height:1.5}
    .pro-section .pro-features{list-style:none;padding:0;margin:8px 0}
    .pro-section .pro-features li{padding:4px 0;color:#c5c5d2;font-size:.9rem;display:flex;align-items:center;gap:8px}
    .pro-section .pro-features li svg{width:16px;height:16px;color:#f59e0b;flex-shrink:0}

    /* ===== CODE INPUT ===== */
    .code-input-area{text-align:center;margin:16px 0}
    .code-input{background:#40414f;border:2px solid #565869;border-radius:8px;padding:12px 16px;color:#ececf1;font-size:1.2rem;text-align:center;letter-spacing:4px;width:100%;max-width:250px;outline:none;transition:border-color .2s}
    .code-input:focus{border-color:#f59e0b}
    .code-input.invalid{border-color:#ef4444;animation:shake .3s}
    .code-input.valid{border-color:#19c37d}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
    .code-submit{background:#f59e0b;color:#0b1412;border:none;padding:12px 24px;border-radius:8px;font-weight:600;font-size:1rem;cursor:pointer;margin-top:10px;transition:background .2s,transform .1s}
    .code-submit:hover{background:#d97706}
    .code-submit:active{transform:scale(.95)}
    .transfer-info{background:#40414f;padding:12px;border-radius:8px;margin:12px 0;text-align:left}
    .transfer-info p{margin-bottom:6px;font-size:.9rem}
    .transfer-info .info-label{color:#8e8ea0;font-size:.8rem}
    .transfer-info .info-value{color:#ececf1;font-weight:600;font-size:1rem;letter-spacing:1px}

<!-- MODAL PERFIL -->

<!-- MODAL PRO / LIMITE -->

<div id="toast"></div>
<script>
const $=s=>document.querySelector(s);
const chat=$('#chat'),inp=$('#inp'),sbtn=$('#sbtn'),cc=$('#cc'),sbadge=$('#sbadge'),eban=$('#ebanner'),mover=$('#mover'),toastEl=$('#toast'),profileModal=$('#profile-modal'),profileContent=$('#profile-content'),profileTrigger=$('#profile-trigger'),proModal=$('#pro-modal'),proContent=$('#pro-content'),iwrap=$('#iwrap'),limitDisplay=$('#limit-display');

const state={msgs:[],ctx:[],busy:false,online:false,apiIdx:0,timer:null,ttsEnabled:false,fontSize:100,voiceSupported:false,proMode:false,proCode:null};

// ===== LISTA DE CODIGOS PRO VALIDOS =====
const PRO_CODES = [
  'ATHENA-PRO-2026-X7K9',
  'ATHENA-PRO-2026-M4R2',
  'ATHENA-PRO-2026-Q8W5',
  'ATHENA-PRO-2026-P3N6',
  'ATHENA-PRO-2026-L9H1',
  'ATHENA-PRO-2026-F6T4',
  'ATHENA-PRO-2026-J2V8',
  'ATHENA-PRO-2026-B5C3',
  'ATHENA-PRO-2026-R1D7',
  'ATHENA-PRO-2026-S4G0',
  'ATHENA-PRO-2026-W8Y2',
  'ATHENA-PRO-2026-K6A9',
  'ATHENA-PRO-2026-H3E5',
  'ATHENA-PRO-2026-N7I1',
  'ATHENA-PRO-2026-U0O4',
  'ATHENA-PRO-2026-V9X6',
  'ATHENA-PRO-2026-Z2L8',
  'ATHENA-PRO-2026-D4F3',
  'ATHENA-PRO-2026-T5J7',
  'ATHENA-PRO-2026-Y1P0'
];
const USED_CODES_KEY = 'athena-used-codes';
function getUsedCodes(){try{return JSON.parse(localStorage.getItem(USED_CODES_KEY))||{}}catch{return{}}}
function useCode(code){const used=getUsedCodes();used[code]=true;localStorage.setItem(USED_CODES_KEY,JSON.stringify(used))}
function isCodeUsed(code){return getUsedCodes()[code]===true}

// ===== LIMITE DE CONSULTAS =====
const LIMIT_KEY = 'athena-query-limit';
const LIMIT_MAX = 20;
function getQueryData(){
  try{const d=JSON.parse(localStorage.getItem(LIMIT_KEY));return d}catch{return null}
}
function setQueryData(data){localStorage.setItem(LIMIT_KEY,JSON.stringify(data))}
function getRemainingQueries(){
  const data=getQueryData();
  if(!data)return LIMIT_MAX;
  const now=Date.now();
  const elapsed=now-data.timestamp;
  const hours24=24*60*60*1000;
  if(elapsed>=hours24){return LIMIT_MAX}
  return Math.max(0,data.count<LIMIT_MAX?LIMIT_MAX-data.count:0);
}
function consumeQuery(){
  const data=getQueryData();
  const now=Date.now();
  const hours24=24*60*60*1000;
  if(!data||now-data.timestamp>=hours24){
    setQueryData({timestamp:now,count:1});
  }else{
    data.count++;
    setQueryData(data);
  }
}
function resetQueryLimit(){
  const data=getQueryData();
  if(data){data.count=0;data.timestamp=Date.now();setQueryData(data)}
}

// ===== PERFIL =====
const AVATARS=['😀','😎','🦊','🐺','🦁','🐯','🐼','🦄','🐙','🦋'];
let profile=loadProfile();
function loadProfile(){try{const d=JSON.parse(localStorage.getItem('athena-profile'));if(d&&d.name)return d}catch{}return null}
function saveProfile(p){localStorage.setItem('athena-profile',JSON.stringify(p));profile=p;updateProfileUI()}
function deleteProfile(){localStorage.removeItem('athena-profile');profile=null;updateProfileUI();showToast('Perfil eliminado','ok')}
function updateProfileUI(){const t=profileTrigger.querySelector('span');t.textContent=profile?profile.name:'Athena'}
function showProfileModal(){
  if(!profile){profileContent.innerHTML=`<div class="profile-header"><div class="profile-avatar-big">👤</div></div><div class="no-profile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><h3>Crea tu perfil</h3><p>Personaliza tu experiencia con nombre, avatar y preferencias</p><button class="create-btn" onclick="showEditProfile()">Crear perfil</button></div><div style="text-align:center;margin-top:12px"><button class="cancel-btn" onclick="closeProfileModal()">Cerrar</button></div>`}
  else{const totalMsg=state.msgs.length;const totalChats=parseInt(localStorage.getItem('athena-chat-count')||'0');
  profileContent.innerHTML=`<div class="profile-header"><div class="profile-avatar-big${state.proMode?' pro':''}">${profile.avatar}</div><div class="profile-card"><h3>${esc(profile.name)}${state.proMode?' <span class="pro-badge">PRO</span>':''}</h3>${profile.bio?`<p>${esc(profile.bio)}</p>`:'<p>Sin biografía</p>'}</div><div class="profile-stats"><div class="stat-box"><div class="stat-num${state.proMode?' pro':''}">${state.proMode?'∞':getRemainingQueries()}</div><div class="stat-label">Consultas restantes</div></div><div class="stat-box"><div class="stat-num">${totalMsg}</div><div class="stat-label">Mensajes</div></div><div class="stat-box"><div class="stat-num">${totalChats}</div><div class="stat-label">Conversaciones</div></div></div></div><div class="profile-actions"><button class="save-btn" onclick="showEditProfile()">Editar perfil</button>${state.proMode?'':'<button class="del-btn" onclick="confirmDeleteProfile()">Eliminar</button>'}</div><div style="text-align:center;margin-top:10px"><button class="cancel-btn" onclick="closeProfileModal()">Cerrar</button></div>`}
  profileModal.classList.add('s')
}
function showEditProfile(){profileContent.innerHTML=`<div class="mhead"><h3>${profile?'Editar perfil':'Crear perfil'}</h3><button class="ibtn" onclick="closeProfileModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div><div class="pform"><label>Avatar</label><div class="avatar-grid" id="avatar-grid">${AVATARS.map(a=>`<div class="av-option${profile&&profile.avatar===a?' selected':''}" data-av="${a}">${a}</div>`).join('')}</div><label>Nombre</label><input type="text" id="prof-name" placeholder="Tu nombre" maxlength="30" value="${profile?esc(profile.name):''}"/><label>Biografía (opcional)</label><textarea id="prof-bio" placeholder="Cuéntanos sobre ti..." maxlength="200">${profile?esc(profile.bio||''):''}</textarea></div><div class="profile-actions"><button class="save-btn" id="prof-save">Guardar</button><button class="cancel-btn" onclick="showProfileModal()">Cancelar</button></div>`;
  document.querySelectorAll('.av-option').forEach(el=>{el.onclick=()=>{document.querySelectorAll('.av-option').forEach(e=>e.classList.remove('selected'));el.classList.add('selected')}});
  $('#prof-save').onclick=()=>{const name=$('#prof-name').value.trim();if(!name){showToast('El nombre es obligatorio','err');return}const avEl=document.querySelector('.av-option.selected');const av=avEl?avEl.dataset.av:AVATARS[0];const bio=$('#prof-bio').value.trim();saveProfile({name,avatar:av,bio,created:profile?profile.created:new Date().toISOString()});closeProfileModal();showToast('Perfil guardado','ok');updateAllUserMessages()}}
function confirmDeleteProfile(){if(confirm('¿Eliminar tu perfil?')){deleteProfile();closeProfileModal();updateAllUserMessages()}}
function closeProfileModal(){profileModal.classList.remove('s')}
function updateAllUserMessages(){chat.querySelectorAll('.msg.user').forEach(msg=>{const av=msg.querySelector('.av-emoji');if(av)av.textContent=profile?profile.avatar:''})}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
profileTrigger.onclick=()=>showProfileModal();profileModal.onclick=e=>{if(e.target===profileModal)closeProfileModal()};

// ===== ICONS =====
const ICONS={bot:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v1a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>',user:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',copy:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',regen:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>',tts:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>',ok:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>',info:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',err:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',pro:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>'};

// ===== PARSING MARKDOWN =====
function parseMarkdown(text){if(!text) return '';let html=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*\*(.+?)\*\*\*/g,'<b><i>$1</i></b>').replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\*(.+?)\*/g,'<i>$1</i>').replace(/`{3}(\w*)\n?([\s\S]*?)`{3}/g,'<pre><code class="language-$1">$2</code><button class="copy-code">'+ICONS.copy+' Copiar</button>').replace(/`(.+?)`/g,'<code>$1</code>').replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>').replace(/^(#{1,3})\s+(.+)$/gm,(m,h,t)=>`<h${h.length}>${t}</h${h.length}>`).replace(/^\*\s+(.+)$/gm,'<li>$1</li>').replace(/^\d+\.\s+(.+)$/gm,'<li>$1</li>').replace(/(<li>.*<\/li>)/gs,m=>`<ul>${m}</ul>`).replace(/^---+$/gm,'<hr>').replace(/^>\s+(.+)$/gm,'<blockquote>$1</blockquote>').replace(/\n{2,}/g,'</p><p>').replace(/\n/g,'<br>');return `<p>${html}</p>`}

// ===== TOAST =====
function toast(msg,type='info'){const el=document.createElement('div');el.className='tst';el.innerHTML=ICONS[type]+`<span>${msg}</span>`;toastEl.appendChild(el);setTimeout(()=>el.remove(),3000)}

// ===== STATUS =====
function status(txt,cls){sbadge.innerHTML=`<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="8"/></svg>${txt}`;sbadge.className=cls}
function errMsg(msg){eban.textContent=msg;eban.classList.add('s');setTimeout(()=>eban.classList.remove('s'),5000)}
function openModal(s){mover.classList.toggle('s',s);document.body.style.overflow=s?'hidden':''}
function scrollEnd(){chat.scrollTop=chat.scrollHeight}
function adjH(){inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,120)+'px'}
function updC(){const l=inp.value.length;cc.textContent=`${l}/4000`;cc.style.color=l>3800?'#f56565':'#8e8ea0'}
async function copyTxt(txt,msg){try{await navigator.clipboard.writeText(txt);toast(msg,'ok')}catch{toast('Error','err')}}

// ===== VOICE =====
let recognition;function initVoice(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){state.voiceSupported=false;$('#voice-btn').style.display='none';return}state.voiceSupported=true;recognition=new SR();recognition.lang='es-ES';recognition.continuous=false;recognition.interimResults=false;recognition.onresult=e=>{inp.value=(inp.value+' '+e.results[0][0].transcript).trim();adjH();updC();toast('Texto reconocido','ok')};recognition.onerror=()=>{$('#voice-btn').classList.remove('listening');toast('Error de voz','err')};recognition.onend=()=>{$('#voice-btn').classList.remove('listening')}}
$('#voice-btn').onclick=()=>{if(!state.voiceSupported){toast('Voz no soportada','err');return}if($('#voice-btn').classList.contains('listening')){recognition.stop();return}try{recognition.start();$('#voice-btn').classList.add('listening');toast('Escuchando...','info')}catch{toast('Error','err')}}

// ===== TTS =====
function speak(text){if(!state.ttsEnabled)return;if('speechSynthesis'in window){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text.replace(/[\*\`]/g,''));u.lang='es-ES';u.rate=0.9;window.speechSynthesis.speak(u)}}
$('#tts-global').onclick=()=>{state.ttsEnabled=!state.ttsEnabled;$('#tts-global').style.opacity=state.ttsEnabled?'1':'0.6';toast(state.ttsEnabled?'Lectura activada':'Lectura desactivada','info')}

// ===== TEMA =====
$('#theme-btn').onclick=()=>{document.body.classList.toggle('light');const l=document.body.classList.contains('light');localStorage.setItem('athena-theme',l?'light':'dark');toast(l?'Tema claro':'Tema oscuro','info')}
if(localStorage.getItem('athena-theme')==='light')document.body.classList.add('light')

// ===== APIS =====
const CORS_PROXIES=['https://api.allorigins.win/raw?url=','https://corsproxy.io/?',''];
async function fetchWithCORS(url,options={}){for(const proxy of CORS_PROXIES){try{const ctrl=new AbortController();const t=setTimeout(()=>ctrl.abort(),proxy?12000:10000);const res=await fetch(proxy?proxy+encodeURIComponent(url):url,{...options,signal:ctrl.signal});clearTimeout(t);if(res.ok)return await res.text()}catch{}}throw new Error('CORS failed')}
async function callPollinations(prompt,ctx,model='openai'){const ctx2=ctx.length>0?`Contexto:\n${ctx.slice(-5).map(m=>`${m.r==='u'?'Usuario':'Asistente'}: ${m.c}`).join('\n')}\n\n`:'';const url=`https://text.pollinations.ai/${encodeURIComponent(ctx2+prompt)}?model=${model}&seed=${Date.now()%1e6}&json=false`;return(await fetchWithCORS(url,{headers:{'Accept':'text/plain'}})).trim()}
async function testConnection(){try{const ctrl=new AbortController();setTimeout(()=>ctrl.abort(),8000);const res=await fetch('https://text.pollinations.ai/hello?model=openai&seed=1',{signal:ctrl.signal,headers:{'Accept':'text/plain'}});if(res.ok||res.status===404)return true}catch{}try{const res=await fetch('https://api.allorigins.win/raw?url='+encodeURIComponent('https://text.pollinations.ai/hello?model=openai&seed=1'));if(res.ok)return true}catch{}return false}
async function findWorkingConnection(){status('Conectando','searching');eban.classList.remove('s');if(await testConnection()){state.online=true;status(state.proMode?'PRO':'Conectado',state.proMode?'pro':'ok');return true}state.online=false;status('Modo Offline','off');errMsg('Modo offline activado.');toast('Modo offline: respuestas locales','info');scheduleReconnect();return false}
function scheduleReconnect(){clearTimeout(state.timer);state.timer=setTimeout(()=>{if(!state.online&&navigator.onLine)findWorkingConnection()},10000)}

// ===== LOCAL =====
const localResponses={greetings:['Hola. ¿En qué puedo ayudarte?','Bienvenido. ¿Qué necesitas?','Saludos. Estoy lista para asistirte.'],thanks:['De nada. ¿Algo más?','Un placer. ¿Necesitas algo adicional?','Con gusto. Aquí estaré.'],about:`Soy Athena, un asistente de IA integrado en esta página.\n\n**Funciones:**\n• 🎤 Entrada por voz\n• 🔊 Lectura en voz alta\n• 🎨 Tema claro/oscuro\n• 👤 Perfil de usuario\n• 🔍 Comandos: /help, /clear, /export\n• 💬 Sugerencias rápidas\n• 📋 Copiar código\n• 📤 Compartir conversación\n• 🔤 Ajustar tamaño de texto\n• 🌐 Pollinations.ai + fallback local`,code:`Ejemplo en JavaScript:\n\n\`\`\`js\nfunction sumar(a,b){return a+b}\nconsole.log(sumar(5,3)) // 8\n\`\`\`\n\n¿Código específico que necesitas?`,farewell:['Hasta luego.','Adiós.','Nos vemos.'],help:`**Comandos:**\n\n\`/help\` - Ayuda\n\`/clear\` - Limpia chat\n\`/export\` - Exporta a archivo\n\`/tts on|off\` - Lectura voz\n\`/theme\` - Cambia tema\n\n**Formato:** **negrita**, *cursiva*, \`código\`, [enlaces](url)`,default:['Interesante. ¿Podrías dar más contexto?','Entiendo. En modo offline mis respuestas son predefinidas.','Buena pregunta. Haré mi mejor esfuerzo.']}
function getLocalResponse(input){const l=input.toLowerCase().trim();const pick=arr=>arr[Math.floor(Math.random()*arr.length)];if(/^(hola|hey|buenos|hi|hello)/i.test(l))return pick(localResponses.greetings);if(/(gracias|thank)/i.test(l))return pick(localResponses.thanks);if(/(quien eres|que eres|como funcion|funciones|puedes hacer)/i.test(l))return localResponses.about;if(/(codigo|program|javascript|python|html)/i.test(l))return localResponses.code;if(/(adios|chao|bye|hasta luego)/i.test(l))return pick(localResponses.farewell);if(/(^\/help$|^\/ayuda$)/i.test(l))return localResponses.help;if(/(que es|explica|help|ayuda|puedes)/i.test(l))return localResponses.help;return localResponses.default[state.msgs.length%localResponses.default.length]}

// ===== ENVIO CON LIMITE =====
async function send(){
  const txt=inp.value.trim();if(!txt||state.busy)return;
  if(txt.startsWith('/')){if(handleCommand(txt)){inp.value='';adjH();updC();return}}
  
  // Verificar límite
  if(!state.proMode){
    const remaining=getRemainingQueries();
    if(remaining<=0){
      updateLimitDisplay();
      toast('Límite alcanzado. Ingresa un código PRO o espera 24h','err');
      return;
    }
  }
  
  console.log('📤',txt.slice(0,50));
  addMsg('u',txt);inp.value='';adjH();updC();pushCtx('u',txt);state.msgs.push({r:'u',c:txt,t:new Date().toLocaleTimeString()});
  showType();state.busy=true;sbtn.disabled=true;
  
  // Consumir consulta
  if(!state.proMode)consumeQuery();
  updateLimitDisplay();
  
  try{
    let r,md=false;
    if(state.online){
      const model=state.proMode?'gpt-4':'openai';
      try{r=await callPollinations(txt,state.ctx,model);md=true}
      catch(e){
        console.warn('❌ API failed:',e.message);
        state.online=false;status('Reconectando','searching');
        // Animación de error
        hideType();
        addMsg('b',`⚠️ **Problema de conexión**\n\nNo se pudo conectar con el servidor. Esto puede deberse a:\n• Problemas temporales de red\n• El servidor está sobrecargado\n• Bloqueo de conexión\n\nIntenta de nuevo en unos segundos.`,true);
        state.msgs.push({r:'b',c:'Error de conexión',t:new Date().toLocaleTimeString()});
        // Reintentar automáticamente
        setTimeout(()=>findWorkingConnection(),2000);
        return;
      }
    }else{
      // Sin conexión - mostrar animación de error
      hideType();
      addMsg('b',generateErrorAnimation(),false);
      state.msgs.push({r:'b',c:'Sin conexión',t:new Date().toLocaleTimeString()});
      findWorkingConnection().then(ok=>{
        if(ok){
          // Eliminar mensaje de error y reenviar
          const last=chat.lastElementChild;
          if(last?.classList.contains('msg')&&!last.classList.contains('user')){last.remove();state.msgs.pop()}
          send(); // Reintentar automáticamente
        }
      });
      return;
    }
    addMsg('b',r,md);pushCtx('b',r);state.msgs.push({r:'b',c:r,t:new Date().toLocaleTimeString()});
    if(!state.online&&navigator.onLine)findWorkingConnection().then(ok=>{if(ok)toast('Conexión restaurada','ok')});
  }catch(e){
    console.error('💥 Error:',e);
    state.online=false;status('Modo Offline','off');
    hideType();
    addMsg('b',generateErrorAnimation(),false);
    state.msgs.push({r:'b',c:'Error',t:new Date().toLocaleTimeString()});
  }finally{hideType();state.busy=false;sbtn.disabled=false;scrollEnd()}
}

// ===== ANIMACION DE ERROR =====
function generateErrorAnimation(){
  return `<div class="error-anim" style="padding:16px;border-radius:12px;background:#2b2d31">
    <div class="error-waves"><span></span><span></span><span></span><span></span><span></span></div>
    <p style="text-align:center;color:#8e8ea0;font-size:.9rem;margin-top:8px">Error de conexión</p>
    <p style="text-align:center;color:#8e8ea0;font-size:.8rem">Reintentando automáticamente...</p>
    <button class="retry-btn" onclick="retryConnection()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>Reintentar ahora</button>
  </div>`;
}

// ===== RETRY =====
async function retryConnection(){
  const btn=event.target.closest('.retry-btn');
  btn.disabled=true;btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;animation:spin 1s linear infinite"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>Conectando...';
  const ok=await findWorkingConnection();
  if(ok){
    toast('Conexión restaurada','ok');
    // Reenviar último mensaje del usuario
    const lastUser=[...state.ctx].reverse().find(m=>m.r==='u');
    if(lastUser){
      // Eliminar mensaje de error
      const last=chat.lastElementChild;
      if(last?.classList.contains('msg')&&!last.classList.contains('user')){last.remove();state.msgs.pop()}
      showType();state.busy=true;sbtn.disabled=true;
      try{
        const model=state.proMode?'gpt-4':'openai';
        const r=await callPollinations(lastUser.c,state.ctx,model);
        addMsg('b',r,true);pushCtx('b',r);state.msgs.push({r:'b',c:r,t:new Date().toLocaleTimeString()})
      }catch{addMsg('b',generateErrorAnimation(),false);state.msgs.push({r:'b',c:'Error',t:new Date().toLocaleTimeString()})}
      finally{hideType();state.busy=false;sbtn.disabled=false;scrollEnd()}
    }
  }else{btn.disabled=false;btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>Reintentar ahora'}
}
