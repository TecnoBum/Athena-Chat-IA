<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="theme-color" content="#343541"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Athena Chat IA</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#343541;color:#ececf1;line-height:1.5;overflow:hidden}
    #app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:900px;margin:0 auto;width:100%}
    header{padding:10px 16px;background:#202123;border-bottom:1px solid #4d4d4f;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10}
    .htitle{display:flex;align-items:center;gap:10px;font-weight:600;font-size:1.1rem}
    .htitle svg{width:24px;height:24px}
    .hactions{display:flex;align-items:center;gap:6px}
    .ibtn{background:transparent;border:none;color:#ececf1;width:36px;height:36px;border-radius:8px;display:grid;place-items:center;cursor:pointer;padding:6px;transition:background .2s}
    .ibtn:hover{background:#444654}
    .ibtn:active{background:#565869}
    .ibtn svg{width:20px;height:20px}
    #sbadge{font-size:.65rem;padding:3px 10px;border-radius:10px;font-weight:500;display:flex;align-items:center;gap:4px;white-space:nowrap}
    #sbadge.ok{background:#19c37d;color:#0b1412}
    #sbadge.searching{background:#d69e2e;color:#0b1412;animation:pulse 1s infinite}
    #sbadge.off{background:#565869;color:#ececf1}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    #sbadge svg{width:10px;height:10px}
    #chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
    .msg{display:flex;gap:10px;max-width:90%;animation:up .2s}
    @keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .msg.bot{align-self:flex-start}
    .msg.user{align-self:flex-end;flex-direction:row-reverse}
    .av{width:32px;height:32px;border-radius:6px;display:grid;place-items:center;flex-shrink:0}
    .msg.bot .av{background:#19c37d}
    .msg.bot .av svg{width:16px;height:16px;color:#0b1412}
    .msg.user .av{background:#5436da}
    .msg.user .av svg{width:16px;height:16px;color:#fff}
    .mc{padding:12px 14px;border-radius:16px;word-break:break-word;line-height:1.6;font-size:.95rem}
    .msg.bot .mc{background:#2b2d31;border-top-left-radius:4px}
    .msg.user .mc{background:#444654;border-top-right-radius:4px}
    .mc b,.mc strong{font-weight:600;color:#fff}
    .mc i,.mc em{font-style:italic;color:#c5c5d2}
    .mc code{background:#1e1f29;padding:2px 6px;border-radius:4px;font-family:monospace;font-size:.9em;color:#e0e0ff}
    .mc pre{background:#1e1f29;padding:12px;border-radius:8px;overflow-x:auto;margin:8px 0;font-family:monospace;font-size:.9em}
    .mc pre code{background:none;padding:0;color:#a0d4ff}
    .mc ul,.mc ol{padding-left:20px;margin:8px 0}
    .mc li{margin:4px 0}
    .mc a{color:#6db3f2;text-decoration:none}
    .mc a:hover{text-decoration:underline}
    .mc hr{border:none;border-top:1px solid #4d4d4f;margin:12px 0}
    .mc blockquote{border-left:3px solid #19c37d;padding-left:12px;margin:8px 0;color:#a0a0b0}
    .meta{display:flex;align-items:center;gap:8px;margin-top:6px;font-size:.7rem;color:#8e8ea0}
    .ma{display:flex;gap:2px;margin-left:auto}
    .mab{background:transparent;border:none;color:#8e8ea0;width:22px;height:22px;border-radius:4px;display:grid;place-items:center;cursor:pointer;padding:2px;transition:color .2s,background .2s}
    .mab:hover{color:#ececf1;background:#444654}
    .mab svg{width:13px;height:13px}
    #ia{padding:10px 16px 14px;background:#343541;border-top:1px solid #4d4d4f;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,14px)}
    #ebanner{background:#7b2d3a;color:#fff;padding:6px 10px;border-radius:6px;margin-bottom:6px;font-size:.82rem;display:none}
    #ebanner.s{display:block;animation:up .3s}
    #iwrap{display:flex;align-items:flex-end;gap:8px;background:#40414f;border-radius:14px;padding:6px 10px;border:1px solid #565869;transition:border-color .2s,box-shadow .2s}
    #iwrap:focus-within{border-color:#19c37d;box-shadow:0 0 0 2px rgba(25,195,125,.2)}
    #inp{flex:1;background:transparent;border:none;color:#ececf1;font-size:1rem;resize:none;max-height:120px;outline:none;padding:6px 2px;line-height:1.4;min-height:24px}
    #inp::placeholder{color:#8e8ea0}
    #cc{font-size:.65rem;color:#8e8ea0;text-align:right;margin-top:3px}
    #sbtn{background:#19c37d;border:none;color:#0b1412;width:36px;height:36px;border-radius:8px;cursor:pointer;display:grid;place-items:center;flex-shrink:0;transition:background .2s,transform .1s}
    #sbtn:hover{background:#1a9f66}
    #sbtn:active{transform:scale(.95)}
    #sbtn:disabled{background:#565869;cursor:not-allowed;transform:none;opacity:.5}
    #sbtn svg{width:18px;height:18px}
    .type{display:flex;gap:4px;padding:12px 14px;background:#2b2d31;border-radius:16px;border-top-left-radius:4px;width:fit-content;align-self:flex-start}
    .type span{width:6px;height:6px;background:#8e8ea0;border-radius:50%;animation:tb 1.4s infinite ease-in-out}
    .type span:nth-child(1){animation-delay:-.32s}
    .type span:nth-child(2){animation-delay:-.16s}
    @keyframes tb{0%,80%,100%{transform:scale(.7);opacity:.5}40%{transform:scale(1.2);opacity:1}}
    .wel{text-align:center;padding:30px 20px;color:#8e8ea0}
    .wel svg{width:44px;height:44px;margin-bottom:14px;opacity:.7}
    .wel h2{color:#ececf1;margin-bottom:8px;font-size:1.2rem}
    .wel p{margin-bottom:5px;font-size:.9rem}
    .mover{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;place-items:end center;z-index:20;padding:14px}
    .mover.s{display:grid;animation:up .2s}
    .mcont{background:#202123;border-radius:14px 14px 0 0;padding:16px;width:100%;max-width:480px;max-height:65vh;overflow-y:auto}
    .mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #4d4d4f}
    .mhead h3{font-size:1rem;font-weight:600}
    .mlist{display:flex;flex-direction:column;gap:3px}
    .mitem{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:#2b2d31;cursor:pointer;font-size:.92rem;transition:background .15s}
    .mitem:hover{background:#444654}
    .mitem svg{width:18px;height:18px;flex-shrink:0}
    .mitem.danger{color:#f56565}
    .mitem.danger:hover{background:#4a2d35}
    #toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:30;display:flex;flex-direction:column;gap:6px;pointer-events:none}
    .tst{background:#202123;color:#ececf1;padding:8px 14px;border-radius:8px;font-size:.85rem;box-shadow:0 4px 16px rgba(0,0,0,.3);display:flex;align-items:center;gap:6px;animation:up .3s,fo .3s 2.5s forwards;pointer-events:auto;max-width:85vw}
    .tst svg{width:16px;height:16px;flex-shrink:0}
    @keyframes fo{to{opacity:0;transform:translateY(-8px)}}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#565869;border-radius:3px}
    @media(max-width:480px){.msg{max-width:95%}.mc{font-size:.9rem}header{padding:8px 12px}#ia{padding:8px 12px 12px}}
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="htitle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v1a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
      <span>Athena Chat IA</span>
    </div>
    <div class="hactions">
      <span id="sbadge" class="searching"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="8"/></svg>Conectando</span>
      <button class="ibtn" id="mbtn" aria-label="Menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    </div>
  </header>
  <div id="chat"><div class="wel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><h2>Athena Chat IA</h2><p>Asistente conectado en tiempo real</p></div></div>
  <div id="ia">
    <div id="ebanner"></div>
    <div id="iwrap"><textarea id="inp" placeholder="Escribe tu mensaje..." rows="1" maxlength="4000" aria-label="Mensaje"></textarea><button id="sbtn" aria-label="Enviar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button></div>
    <div id="cc">0 / 4000</div>
  </div>
</div>
<div class="mover" id="mover" role="dialog" aria-modal="true"><div class="mcont"><div class="mhead"><h3>Opciones</h3><button class="ibtn" id="mclose" aria-label="Cerrar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div><div class="mlist"><div class="mitem" id="nchat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nueva conversacion</div><div class="mitem" id="eport"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Exportar chat</div><div class="mitem" id="call"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copiar todo</div><div class="mitem danger" id="cchat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>Limpiar chat</div></div></div></div>
<div id="toast"></div>
<script>
const $=s=>document.querySelector(s);
const chat=$('#chat'),inp=$('#inp'),sbtn=$('#sbtn'),cc=$('#cc'),sbadge=$('#sbadge'),eban=$('#ebanner'),mover=$('#mover'),toastEl=$('#toast');
const state={msgs:[],ctx:[],busy:false,ok:false,apiIdx:0,timer:null};

const ICONS={
  bot:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v1a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>',
  user:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
  copy:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',
  regen:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>',
  ok:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>',
  info:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',
  err:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
};

// ===== PARSING MARKDOWN SIMPLE =====
function parseMarkdown(text){
  if(!text) return '';
  let html=text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*\*(.+?)\*\*\*/g,'<b><i>$1</i></b>')
    .replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')
    .replace(/\*(.+?)\*/g,'<i>$1</i>')
    .replace(/___(.+?)___/g,'<b><i>$1</i></b>')
    .replace(/__(.+?)__/g,'<b>$1</b>')
    .replace(/_(.+?)_/g,'<i>$1</i>')
    .replace(/`{3}(\w*)\n?([\s\S]*?)`{3}/g,'<pre><code>$2</code></pre>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/^(#{1,3})\s+(.+)$/gm,(m,h,t)=>`<h${h.length}>${t}</h${h.length}>`)
    .replace(/^\*\s+(.+)$/gm,'<li>$1</li>')
    .replace(/^\d+\.\s+(.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs,m=>`<ul>${m}</ul>`)
    .replace(/^---+$/gm,'<hr>')
    .replace(/^>\s+(.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/\n{2,}/g,'</p><p>')
    .replace(/\n/g,'<br>');
  return `<p>${html}</p>`;
}

function toast(msg,type='info'){
  const el=document.createElement('div');
  el.className='tst';
  el.innerHTML=ICONS[type]+`<span>${msg}</span>`;
  toastEl.appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

function status(txt,cls){sbadge.innerHTML=`<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="8"/></svg>${txt}`;sbadge.className=cls;}
function errMsg(msg){eban.textContent=msg;eban.classList.add('s');setTimeout(()=>eban.classList.remove('s'),5000);}
function openModal(s){mover.classList.toggle('s',s);document.body.style.overflow=s?'hidden':'';}
function scrollEnd(){chat.scrollTop=chat.scrollHeight;}
function adjH(){inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,120)+'px';}
function updC(){const l=inp.value.length;cc.textContent=`${l}/4000`;cc.style.color=l>3800?'#f56565':'#8e8ea0';}
async function copyTxt(txt,msg){try{await navigator.clipboard.writeText(txt);toast(msg,'ok')}catch{toast('Error','err')}}

// ===== APIS POLLINATIONS.AI =====
const APIS=[
  {id:'p-get',timeout:12000,async call(prompt,ctx){
    const c=ctx.length?`Contexto:\n${ctx.slice(-4).map(m=>`${m.r==='u'?'U':'A'}: ${m.c}`).join('\n')}\n\n`:'';
    const r=await fetch(`https://text.pollinations.ai/${encodeURIComponent(c+prompt)}?model=openai&seed=${Date.now()%1e6}`,{headers:{'Accept':'text/plain'}});
    if(!r.ok)throw r.status;return await r.text();
  }},
  {id:'p-post',timeout:15000,async call(prompt,ctx){
    const msgs=[{role:'system',content:'Responde de forma util y concisa. Usa formato markdown para negrita (**texto**), italic (*texto*), codigo (`codigo`), listas y enlaces.'},...ctx.slice(-6).map(m=>({role:m.r==='u'?'user':'assistant',content:m.c})),{role:'user',content:prompt}];
    const r=await fetch('https://text.pollinations.ai/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'openai',messages:msgs})});
    if(!r.ok)throw r.status;return await r.text();
  }},
  {id:'p-mistral',timeout:12000,async call(prompt,ctx){
    const c=ctx.length?`${ctx.slice(-3).map(m=>`${m.r==='u'?'U':'A'}: ${m.c}`).join('\n')}\n\n`:'';
    const r=await fetch(`https://text.pollinations.ai/${encodeURIComponent(c+prompt)}?model=mistral&seed=${Date.now()%1e6}`,{headers:{'Accept':'text/plain'}});
    if(!r.ok)throw r.status;return await r.text();
  }},
  {id:'p-qwen',timeout:12000,async call(prompt,ctx){
    const c=ctx.length?`${ctx.slice(-3).map(m=>`${m.r==='u'?'U':'A'}: ${m.c}`).join('\n')}\n\n`:'';
    const r=await fetch(`https://text.pollinations.ai/${encodeURIComponent(c+prompt)}?model=qwen-coder&seed=${Date.now()%1e6}`,{headers:{'Accept':'text/plain'}});
    if(!r.ok)throw r.status;return await r.text();
  }},
  {id:'p-llama',timeout:12000,async call(prompt,ctx){
    const c=ctx.length?`${ctx.slice(-3).map(m=>`${m.r==='u'?'U':'A'}: ${m.c}`).join('\n')}\n\n`:'';
    const r=await fetch(`https://text.pollinations.ai/${encodeURIComponent(c+prompt)}?model=llama&seed=${Date.now()%1e6}`,{headers:{'Accept':'text/plain'}});
    if(!r.ok)throw r.status;return await r.text();
  }}
];

async function probeAPI(api){
  const ctrl=new AbortController();
  const t=setTimeout(()=>ctrl.abort(),4000);
  try{
    const r=await fetch('https://text.pollinations.ai/',{signal:ctrl.signal,method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'openai',messages:[{role:'user',content:'ok'}]})});
    clearTimeout(t);return r.ok||r.status===400;
  }catch{clearTimeout(t);return false}
}

async function findWorkingAPI(){
  status('Conectando','searching');eban.classList.remove('s');
  const probes=APIS.slice(0,3).map(async(api,i)=>{const ok=await probeAPI(api);return ok?i:-1});
  const results=await Promise.allSettled(probes);
  const working=results.find(r=>r.status==='fulfilled'&&r.value>=0);
  if(working){state.apiIdx=working.value;state.ok=true;status('Conectado','ok');return true}
  for(let i=0;i<APIS.length;i++){if(await probeAPI(APIS[i])){state.apiIdx=i;state.ok=true;status('Conectado','ok');return true}}
  state.ok=false;status('Sin conexion','off');errMsg('Verifica tu conexion. Reintentando...');scheduleReconnect();return false;
}

function scheduleReconnect(){clearTimeout(state.timer);state.timer=setTimeout(()=>{if(!state.ok)findWorkingAPI()},6000);}

async function callAPI(prompt,maxAttempts=3){
  for(let attempt=0;attempt<maxAttempts;attempt++){
    for(let offset=0;offset<APIS.length;offset++){
      const idx=(state.apiIdx+offset)%APIS.length;const api=APIS[idx];
      const ctrl=new AbortController();const to=setTimeout(()=>ctrl.abort(),api.timeout);
      try{
        const result=await api.call(prompt,state.ctx);clearTimeout(to);
        if(result&&result.trim().length>5){state.apiIdx=idx;if(!state.ok){state.ok=true;status('Conectado','ok');toast('Conexion restaurada','ok')}eban.classList.remove('s');return result.trim()}
      }catch(e){clearTimeout(to)}
    }
    if(attempt<maxAttempts-1)await new Promise(r=>setTimeout(r,1000*Math.pow(2,attempt)))
  }
  throw new Error('Todas las APIs fallaron')
}

async function raceCall(prompt){
  const fast=[APIS[0],APIS[2],APIS[3]];
  const promises=fast.map(async(api)=>{
    const ctrl=new AbortController();const to=setTimeout(()=>ctrl.abort(),8000);
    try{const r=await api.call(prompt,state.ctx);clearTimeout(to);if(r&&r.trim().length>5)return{api,result:r}}catch{clearTimeout(to)}return null
  });
  const results=await Promise.allSettled(promises);const winner=results.find(r=>r.status==='fulfilled'&&r.value!==null);
  if(winner){state.apiIdx=fast.indexOf(winner.value.api);return winner.value.result.trim()}
  return callAPI(prompt,2)
}

// ===== MENSAJES =====
function addMsg(role,content){
  const div=document.createElement('div');
  div.className=`msg ${role==='u'?'user':'bot'}`;
  div.innerHTML=`<div class="av">${role==='u'?ICONS.user:ICONS.bot}</div><div style="flex:1;min-width:0"><div class="mc"></div><div class="meta"><span>${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span><div class="ma"><button class="mab" data-a="c" aria-label="Copiar">${ICONS.copy}</button>${role==='b'?`<button class="mab" data-a="r" aria-label="Regenerar">${ICONS.regen}</button>`:''}</div></div></div>`;
  div.querySelector('.mc').innerHTML=role==='b'?parseMarkdown(content):content;
  const wel=chat.querySelector('.wel');if(wel)wel.remove();
  chat.appendChild(div);scrollEnd();return div
}

function showType(){if(chat.querySelector('.type'))return;const t=document.createElement('div');t.className='msg bot type';t.innerHTML='<span></span><span></span><span></span>';chat.appendChild(t);scrollEnd()}
function hideType(){chat.querySelector('.type')?.remove()}
function pushCtx(role,content){state.ctx.push({r:role,c:content});if(state.ctx.length>10)state.ctx=state.ctx.slice(-10)}

// ===== ENVIO =====
async function send(){
  const txt=inp.value.trim();if(!txt||state.busy)return;
  addMsg('u',txt);inp.value='';adjH();updC();pushCtx('u',txt);showType();state.busy=true;sbtn.disabled=true;
  if(!state.ok){const connected=await findWorkingAPI();if(!connected){hideType();state.busy=false;sbtn.disabled=false;errMsg('Sin conexion a internet.');toast('Verifica tu red','err');return}}
  try{
    let response;try{response=await raceCall(txt)}catch{response=await callAPI(txt,3)}
    addMsg('b',response);pushCtx('b',response);state.ok=true;status('Conectado','ok');eban.classList.remove('s')
  }catch(e){state.ok=false;status('Reconectando','searching');errMsg(`Error: ${e.message}. Reintentando...`);findWorkingAPI()}
  finally{hideType();state.busy=false;sbtn.disabled=false;scrollEnd()}
}

// ===== REGENERAR =====
async function regenerate(){
  const lastUser=[...state.ctx].reverse().find(m=>m.r==='u');if(!lastUser)return;
  state.ctx=state.ctx.filter((m,i,arr)=>!(i===arr.length-1&&m.r==='b'));
  const last=chat.lastElementChild;if(last?.classList.contains('msg')&&!last.classList.contains('user'))last.remove();
  state.busy=true;sbtn.disabled=true;showType();
  try{const r=await callAPI(lastUser.c);addMsg('b',r);pushCtx('b',r);toast('Respuesta regenerada','ok')}catch{errMsg('Error al regenerar')}
  finally{hideType();state.busy=false;sbtn.disabled=false;scrollEnd()}
}

// ===== MENU =====
function newChat(){if(state.busy||(state.msgs.length&&!confirm('Iniciar nueva conversacion?')))return;state.msgs=[];state.ctx=[];chat.innerHTML='<div class="wel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><h2>Athena Chat IA</h2><p>Nueva conversacion</p></div>';openModal(false);toast('Nueva conversacion','ok');inp.focus()}
function clearChat(){if(state.busy||!confirm('Eliminar toda la conversacion?'))return;state.msgs=[];state.ctx=[];chat.innerHTML='<div class="wel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><h2>Chat limpiado</h2><p>Que deseas preguntar?</p></div>';openModal(false);toast('Chat eliminado','ok')}
function exportChat(){if(!state.msgs.length){toast('No hay mensajes','info');return}const c=state.msgs.map(m=>`[${m.t}] ${m.r==='u'?'Tu':'Athena'}:\n${m.c}\n`).join('\n---\n\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:'text/plain'}));a.download=`athena_${new Date().toISOString().slice(0,10)}.txt`;a.click();openModal(false);toast('Chat exportado','ok')}
async function copyAll(){if(!state.msgs.length){toast('No hay mensajes','info');return}await copyTxt(state.msgs.map(m=>`${m.r==='u'?'Tu':'Athena'}: ${m.c}`).join('\n\n'),'Chat copiado');openModal(false)}

// ===== EVENTOS =====
sbtn.onclick=send;inp.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}};inp.oninput=()=>{adjH();updC()};
$('#mbtn').onclick=()=>openModal(true);$('#mclose').onclick=()=>openModal(false);mover.onclick=e=>{if(e.target===mover)openModal(false)};
$('#nchat').onclick=newChat;$('#eport').onclick=exportChat;$('#call').onclick=copyAll;$('#cchat').onclick=clearChat;
chat.onclick=e=>{const btn=e.target.closest('.mab');if(!btn)return;const mc=btn.closest('.msg').querySelector('.mc');if(btn.dataset.a==='c')copyTxt(mc.textContent,'Copiado');if(btn.dataset.a==='r')regenerate()};
let hTimer;chat.ontouchstart=e=>{const mc=e.target.closest('.mc');if(!mc)return;hTimer=setTimeout(()=>{copyTxt(mc.textContent,'Copiado');navigator.vibrate?.(50)},500)};chat.ontouchend=chat.ontouchmove=()=>clearTimeout(hTimer);
window.ononline=()=>{if(!state.ok)findWorkingAPI()};inp.onfocus=()=>{if(window.visualViewport)window.visualViewport.scale=1};
adjH();findWorkingAPI();inp.focus();
</script>
</body>
